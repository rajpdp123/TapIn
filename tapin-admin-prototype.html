<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapIn Admin — Good Moves Studio Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: linear-gradient(180deg, #FBF6F1 0%, #EEDBC3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  ::-webkit-scrollbar { width: 0; background: transparent; }
  input::placeholder { color: rgba(0,0,68,0.3); }
  textarea::placeholder { color: rgba(0,0,68,0.3); }
  input:focus, textarea:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ═══════════════════════════════════════════════════════════
// GOOD MOVES STUDIO — TapIn ADMIN Prototype
// Studio Manager & Receptionist PWA
// Design System: Shared with customer app (GMS Brand)
// Admin accent: Blue primary (vs Red for customer)
// ═══════════════════════════════════════════════════════════

// ─── GMS Brand Palette ───
const C = {
  red: "#B0482D", beige: "#EEDBC3", blue: "#001DA2",
  light: "#FBF6F1", text: "#000044", white: "#FFFFFF",
  warmGrad: "linear-gradient(135deg, #C4603F 0%, #B0482D 50%, #8A3520 100%)",
  blueGrad: "linear-gradient(135deg, #1A3FD4 0%, #001DA2 100%)",
  beigeGrad: "linear-gradient(135deg, #FBF6F1 0%, #EEDBC3 100%)",
  greenGrad: "linear-gradient(135deg, #34D399 0%, #059669 100%)",
  redA: function(a) { return "rgba(176,72,45," + a + ")"; },
  blueA: function(a) { return "rgba(0,29,162," + a + ")"; },
  textA: function(a) { return "rgba(0,0,68," + a + ")"; },
  whiteA: function(a) { return "rgba(255,255,255," + a + ")"; },
  greenA: function(a) { return "rgba(5,150,105," + a + ")"; },
  glass: "rgba(255,255,255,0.72)", glassBorder: "rgba(255,255,255,0.35)",
  glassHeavy: "rgba(255,255,255,0.88)",
  shadowXs: "0 1px 2px rgba(0,0,68,0.05)",
  shadowSm: "0 1px 3px rgba(0,0,68,0.08), 0 1px 2px rgba(0,0,68,0.06)",
  shadowMd: "0 4px 8px -2px rgba(0,0,68,0.08), 0 2px 4px -2px rgba(0,0,68,0.06)",
  shadowLg: "0 12px 16px -4px rgba(0,0,68,0.08), 0 4px 6px -2px rgba(0,0,68,0.05)",
  shadowXl: "0 20px 24px -4px rgba(0,0,68,0.1), 0 8px 8px -4px rgba(0,0,68,0.04)",
};

const F = {
  display: "'Quicksand', 'Varela Round', 'Nunito', system-ui, sans-serif",
  body: "system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif",
  xs: 10, sm: 11, base: 13, md: 14, lg: 16, xl: 20, xxl: 24, hero: 28,
};

const S = { xs: 4, sm: 8, md: 12, lg: 16, xl: 20, xxl: 24, xxxl: 32 };
const R = { sm: 8, md: 12, lg: 16, xl: 20, xxl: 24, pill: 100, full: "50%" };
const transition = "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)";

// ─── Blob BGs ───
function BlobBg2({ color, opacity, position, scale }) {
  color = color || C.beige; opacity = opacity || 0.3; position = position || "bottom-left"; scale = scale || 1;
  var positions = {
    "bottom-left": { bottom: -60, left: -50 },
    "top-right": { top: -50, right: -40 },
    "center-left": { top: "40%", left: -90 },
  };
  var pos = positions[position] || positions["bottom-left"];
  return (
    <svg viewBox="0 0 200 200" style={{ position: "absolute", ...pos, width: 200 * scale, height: 200 * scale, opacity: opacity, pointerEvents: "none", zIndex: 0 }}>
      <path d="M39.5,-67.5C52.9,-60.1,66.8,-53.2,74.8,-42C82.8,-30.8,84.9,-15.4,83.3,-0.9C81.7,13.5,76.4,27.1,68.4,38.6C60.4,50.1,49.7,59.6,37.4,66.1C25.1,72.6,11.1,76.1,-2.5,80.3C-16.1,84.5,-32.2,89.4,-45,83.8C-57.8,78.2,-67.3,62.1,-73.5,45.8C-79.7,29.5,-82.6,13,-80.5,1.2C-78.4,-10.6,-71.3,-19,-63.5,-28.3C-55.7,-37.6,-47.2,-47.8,-36.8,-56.7C-26.4,-65.6,-13.2,-73.2,0.4,-73.9C14,-74.6,28,-74.9,39.5,-67.5Z" fill={color} transform="translate(100 100)" />
    </svg>
  );
}

// ─── Shared Components ───
function GlassCard({ children, style, heavy, noBorder, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: heavy ? C.glassHeavy : C.glass,
      backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)",
      borderRadius: R.xl, border: noBorder ? "none" : "1px solid " + C.glassBorder,
      boxShadow: C.shadowMd, position: "relative", zIndex: 1, ...(style || {}),
    }}>{children}</div>
  );
}

function Btn({ children, onClick, disabled, outline, blue, icon, small, style }) {
  var bg = disabled ? C.textA(0.08) : outline ? C.white : blue ? C.blueGrad : C.warmGrad;
  var color = disabled ? C.textA(0.35) : outline ? C.blue : C.white;
  return (
    <div onClick={disabled ? undefined : onClick} style={{
      width: "100%", padding: small ? "10px 0" : "15px 0", borderRadius: R.lg,
      border: outline ? "1.5px solid " + C.blueA(0.3) : "none",
      background: bg, color: color, textAlign: "center",
      fontSize: small ? F.sm : F.md, fontWeight: 700, fontFamily: F.display,
      cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.6 : 1,
      transition: transition, boxShadow: !disabled && !outline ? C.shadowMd : C.shadowXs,
      position: "relative", zIndex: 1,
      display: "flex", alignItems: "center", justifyContent: "center", gap: S.sm,
      ...(style || {}),
    }}>
      {icon && <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>}
      {children}
    </div>
  );
}

function PillTag({ children, variant }) {
  variant = variant || "blue";
  var styles = {
    red: { bg: C.redA(0.08), color: C.red, border: C.redA(0.12) },
    blue: { bg: C.blueA(0.06), color: C.blue, border: C.blueA(0.1) },
    green: { bg: C.greenA(0.08), color: "#059669", border: C.greenA(0.12) },
    warm: { bg: C.beige, color: C.red, border: C.redA(0.1) },
  };
  var s = styles[variant] || styles.blue;
  return (
    <span style={{
      display: "inline-flex", padding: "3px 10px", borderRadius: R.pill,
      background: s.bg, color: s.color, border: "1px solid " + s.border,
      fontSize: F.xs, fontWeight: 700, fontFamily: F.body,
    }}>{children}</span>
  );
}

function SectionLabel({ children }) {
  return (
    <div style={{
      fontSize: 9, fontWeight: 700, color: C.textA(0.4), fontFamily: F.body,
      textTransform: "uppercase", letterSpacing: 1, marginBottom: S.sm, position: "relative", zIndex: 1,
    }}>{children}</div>
  );
}

function Toast({ message, emoji, visible }) {
  return (
    <div style={{
      position: "fixed", top: 60, left: S.md, right: S.md,
      background: C.blueGrad, color: C.white, borderRadius: R.lg,
      padding: "14px 16px", boxShadow: C.shadowXl, zIndex: 20,
      display: "flex", alignItems: "center", gap: S.sm,
      transform: visible ? "translateY(0)" : "translateY(-80px)",
      opacity: visible ? 1 : 0, transition: "all 0.4s cubic-bezier(0.4,0,0.2,1)",
      fontFamily: F.body, fontSize: F.sm, fontWeight: 600,
    }}>
      <span style={{ fontSize: 18 }}>{emoji}</span>{message}
    </div>
  );
}

function Toggle({ value, onChange, label }) {
  return (
    <div onClick={function() { onChange(!value); }} style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      cursor: "pointer", position: "relative", zIndex: 1,
    }}>
      <span style={{ fontSize: F.sm, fontWeight: 600, color: C.text, fontFamily: F.body }}>{label}</span>
      <div style={{
        width: 44, height: 24, borderRadius: R.pill,
        background: value ? C.blueGrad : C.textA(0.12),
        padding: 2, transition: transition, position: "relative",
      }}>
        <div style={{
          width: 20, height: 20, borderRadius: R.full,
          background: C.white, boxShadow: C.shadowSm,
          transform: value ? "translateX(20px)" : "translateX(0)", transition: transition,
        }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MOCK DATA
// ═══════════════════════════════════════════════════════════

// matchStatus: "linked" = matched to Mindbody client via phone/email
//              "standalone" = TapIn-only, no Mindbody match (typically aggregator members)
//              "pending" = awaiting email at visit 10 to retry match
//              "conflict" = multiple possible Mindbody matches found, needs manual resolution
// source: "Direct" = booked directly with studio | "USC" = Urban Sports Club | "ClassPass"
// name: null = phone-only member (visits 1-9, hasn't provided name yet)
var mockMembers = [
  { name: "Lena K.", visits: 8, lastVisit: "Today 09:30", class: "Reformer Basics", avatar: "👩‍🦰", matchStatus: "linked", source: "Direct", phone: "+49 170 ****12" },
  { name: "Sophie M.", visits: 5, lastVisit: "Today 09:30", class: "Reformer Basics", avatar: "👱‍♀️", matchStatus: "standalone", source: "USC", phone: "+49 157 ****88" },
  { name: "Jonas R.", visits: 3, lastVisit: "Today 07:00", class: "Morning Flow", avatar: "🧔", matchStatus: "linked", source: "Direct", phone: "+49 176 ****45" },
  { name: "Anna B.", visits: 10, lastVisit: "Today 07:00", class: "Morning Flow", avatar: "👩", matchStatus: "linked", source: "ClassPass", phone: "+49 151 ****77" },
  { name: null, visits: 1, lastVisit: "Today 08:45", class: "Barre Sculpt", avatar: "📱", matchStatus: "standalone", source: "USC", phone: "+49 162 ****03" },
  { name: "Felix P.", visits: 6, lastVisit: "Yesterday", class: "Power Mat", avatar: "👨", matchStatus: "linked", source: "Direct", phone: "+49 170 ****56" },
  { name: null, visits: 2, lastVisit: "Yesterday", class: "Stretch & Restore", avatar: "📱", matchStatus: "standalone", source: "USC", phone: "+49 160 ****91" },
  { name: "Tom S.", visits: 2, lastVisit: "3 days ago", class: "Morning Flow", avatar: "🧑", matchStatus: "conflict", source: "ClassPass", phone: "+49 152 ****34" },
  { name: "Maria L.", visits: 7, lastVisit: "2 days ago", class: "Reformer Basics", avatar: "👩‍🦳", matchStatus: "conflict", source: "Direct", phone: "+49 171 ****67" },
];

var mockTapIns = [
  { name: "Lena K.", time: "09:32", class: "Reformer Basics", visits: 8, avatar: "👩‍🦰", matchStatus: "linked", source: "Direct", phone: "+49 170 ****12" },
  { name: "Sophie M.", time: "09:30", class: "Reformer Basics", visits: 5, avatar: "👱‍♀️", matchStatus: "standalone", source: "USC", phone: "+49 157 ****88" },
  { name: null, time: "08:45", class: "Barre Sculpt", visits: 1, avatar: "📱", matchStatus: "standalone", source: "USC", phone: "+49 162 ****03" },
  { name: "Jonas R.", time: "07:05", class: "Morning Flow", visits: 3, avatar: "🧔", matchStatus: "linked", source: "Direct", phone: "+49 176 ****45" },
  { name: "Anna B.", time: "07:02", class: "Morning Flow", visits: 10, avatar: "👩", matchStatus: "linked", source: "ClassPass", phone: "+49 151 ****77" },
];

// Mock merge conflicts — receptionist needs to resolve these manually
var mockConflicts = [
  {
    tapinName: "Tom S.", tapinPhone: "+49 152 ****34", visits: 2, source: "ClassPass",
    candidates: [
      { mbName: "Thomas Schmidt", mbEmail: "t.schmidt@gmail.com", lastClass: "Morning Flow", bookedVia: "Direct" },
      { mbName: "Tom Schneider", mbEmail: "tom12345@classpass.com", lastClass: "Morning Flow", bookedVia: "ClassPass" },
    ]
  },
  {
    tapinName: "Maria L.", tapinPhone: "+49 171 ****67", visits: 7, source: "Direct",
    candidates: [
      { mbName: "Maria Lopez", mbEmail: "maria.l@web.de", lastClass: "Reformer Basics", bookedVia: "Direct" },
      { mbName: "Maria Lehmann", mbEmail: "maria.lehmann@gmail.com", lastClass: "Barre Sculpt", bookedVia: "Direct" },
    ]
  },
];

var mockMessages = [
  { title: "Weekend Warrior Special", audience: "All Members", sent: 142, opened: 98, channel: "SMS", date: "Feb 18" },
  { title: "Your free class is waiting!", audience: "Loyal (5+)", sent: 24, opened: 19, channel: "Push", date: "Feb 15" },
  { title: "Welcome to Good Moves!", audience: "New", sent: 8, opened: 7, channel: "SMS", date: "Feb 12" },
];

var mockTemplates = [
  { name: "Welcome", emoji: "👋", preview: "Welcome to Good Moves! Your loyalty journey starts now..." },
  { name: "Reward Reminder", emoji: "🎁", preview: "You're so close to your free class! Just {n} more visits..." },
  { name: "Class Promo", emoji: "🧘", preview: "New class alert! Try {class} with {teacher} this week..." },
  { name: "Win-back", emoji: "💛", preview: "We miss you! Come back and enjoy 20% off your next class..." },
];

var mockProgrammes = [
  { name: "10-Visit Free Class", threshold: 10, reward: "Free class", active: true, members: 47, redeemed: 12 },
  { name: "Summer 2025 Special", threshold: 8, reward: "20% discount", active: false, members: 32, redeemed: 8 },
];

// ═══════════════════════════════════════════════════════════
// TAB 1: DASHBOARD
// ═══════════════════════════════════════════════════════════

function DashboardTab() {
  var _search = useState("");
  var search = _search[0]; var setSearch = _search[1];

  var filtered = search.length > 0
    ? mockMembers.filter(function(m) {
        var q = search.toLowerCase();
        var nameMatch = m.name && m.name.toLowerCase().indexOf(q) >= 0;
        var phoneMatch = m.phone && m.phone.indexOf(q) >= 0;
        return nameMatch || phoneMatch;
      })
    : null;

  return (
    <div style={{ padding: S.lg, display: "flex", flexDirection: "column", gap: S.md, position: "relative", overflow: "hidden" }}>
      <BlobBg2 color={C.beige} opacity={0.25} position="top-right" scale={1} />

      {/* Header */}
      <div style={{ position: "relative", zIndex: 1 }}>
        <div style={{ fontSize: F.xs, color: C.textA(0.4), fontFamily: F.body }}>Studio Dashboard</div>
        <div style={{ fontSize: F.xxl, fontWeight: 800, color: C.text, fontFamily: F.display }}>Today</div>
        <div style={{ fontSize: F.xs, color: C.textA(0.4), fontFamily: F.body, marginTop: 2 }}>Friday, 21 Feb 2026</div>
      </div>

      {/* Stats Row */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: S.sm, position: "relative", zIndex: 1 }}>
        {[
          { label: "Tap-ins", value: "4", emoji: "📱" },
          { label: "Linked", value: "31", emoji: "🔗" },
          { label: "TapIn-only", value: "16", emoji: "📱" },
        ].map(function(s) {
          return (
            <GlassCard key={s.label} heavy style={{ padding: S.md, textAlign: "center" }}>
              <div style={{ fontSize: 20, marginBottom: 4 }}>{s.emoji}</div>
              <div style={{ fontSize: F.xl, fontWeight: 800, color: C.text, fontFamily: F.display }}>{s.value}</div>
              <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>{s.label}</div>
            </GlassCard>
          );
        })}
      </div>

      {/* Search */}
      <GlassCard heavy style={{ padding: "10px 14px", display: "flex", alignItems: "center", gap: S.sm }}>
        <span style={{ fontSize: 14, color: C.textA(0.35) }}>🔍</span>
        <input
          value={search}
          onChange={function(e) { setSearch(e.target.value); }}
          placeholder="Search members..."
          style={{
            flex: 1, border: "none", background: "transparent",
            fontSize: F.sm, fontFamily: F.body, color: C.text,
          }}
        />
        {search && (
          <span onClick={function() { setSearch(""); }} style={{ fontSize: 12, color: C.textA(0.35), cursor: "pointer" }}>✕</span>
        )}
      </GlassCard>

      {/* Search results OR Live feed */}
      {filtered ? (
        <div style={{ position: "relative", zIndex: 1 }}>
          <SectionLabel>Search Results ({filtered.length})</SectionLabel>
          {filtered.length === 0 && (
            <div style={{ textAlign: "center", padding: S.xxl, color: C.textA(0.4), fontSize: F.sm, fontFamily: F.body }}>No members found</div>
          )}
          {filtered.map(function(m, i) {
            var statusColor = m.matchStatus === "linked" ? "#059669" : m.matchStatus === "conflict" ? "#DC2626" : m.matchStatus === "pending" ? C.blue : C.textA(0.35);
            var statusIcon = m.matchStatus === "linked" ? "🔗" : m.matchStatus === "conflict" ? "⚠️" : m.matchStatus === "pending" ? "⏳" : "📱";
            var statusLabel = m.matchStatus === "linked" ? "Linked" : m.matchStatus === "conflict" ? "Conflict" : m.matchStatus === "pending" ? "Pending" : "TapIn-only";
            var isPhoneOnly = !m.name;
            var displayName = m.name || m.phone;
            return (
              <GlassCard key={i} style={{ padding: "12px 14px", marginBottom: S.sm, display: "flex", alignItems: "center", gap: S.md }}>
                <div style={{ width: 36, height: 36, borderRadius: R.full, background: isPhoneOnly ? C.textA(0.06) : C.beigeGrad, display: "flex", alignItems: "center", justifyContent: "center", fontSize: isPhoneOnly ? 16 : 18, flexShrink: 0 }}>{m.avatar}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: F.sm, fontWeight: 700, color: isPhoneOnly ? C.textA(0.55) : C.text, fontFamily: isPhoneOnly ? "monospace" : F.body }}>{displayName}</span>
                    {isPhoneOnly && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: R.pill, background: "#FEF3C7", color: "#92400E", fontWeight: 600, fontFamily: F.body }}>Phone only</span>}
                    {!isPhoneOnly && m.source !== "Direct" && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: R.pill, background: C.textA(0.06), color: C.textA(0.45), fontWeight: 600, fontFamily: F.body }}>{m.source}</span>}
                  </div>
                  <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>{m.visits} visits · {statusIcon} {statusLabel}</div>
                </div>
                <PillTag variant={m.matchStatus === "linked" ? "green" : m.matchStatus === "conflict" ? "red" : m.matchStatus === "pending" ? "blue" : "warm"}>{m.visits}/10</PillTag>
              </GlassCard>
            );
          })}
        </div>
      ) : (
        <div style={{ position: "relative", zIndex: 1 }}>
          <SectionLabel>Live Tap-Ins</SectionLabel>
          {mockTapIns.map(function(t, i) {
            var statusIcon = t.matchStatus === "linked" ? "🔗" : t.matchStatus === "conflict" ? "⚠️" : t.matchStatus === "pending" ? "⏳" : "📱";
            var isPhoneOnly = !t.name;
            var displayName = t.name || t.phone;
            return (
              <GlassCard key={i} style={{ padding: "12px 14px", marginBottom: S.sm, display: "flex", alignItems: "center", gap: S.md }}>
                <div style={{
                  width: 36, height: 36, borderRadius: R.full,
                  background: isPhoneOnly ? C.textA(0.06) : C.beigeGrad,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: isPhoneOnly ? 16 : 18, flexShrink: 0,
                }}>{t.avatar}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{
                      fontSize: F.sm, fontWeight: 700, fontFamily: isPhoneOnly ? "monospace" : F.body,
                      color: isPhoneOnly ? C.textA(0.55) : C.text,
                      letterSpacing: isPhoneOnly ? 0.3 : 0,
                    }}>{displayName}</span>
                    {isPhoneOnly && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: R.pill, background: "#FEF3C7", color: "#92400E", fontWeight: 600, fontFamily: F.body }}>Phone only</span>}
                    {!isPhoneOnly && t.source !== "Direct" && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: R.pill, background: C.textA(0.06), color: C.textA(0.45), fontWeight: 600, fontFamily: F.body }}>{t.source}</span>}
                  </div>
                  <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>{t.class} · {t.time} · {statusIcon}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <PillTag variant={t.visits >= 10 ? "green" : t.visits >= 5 ? "blue" : "warm"}>{t.visits}/10</PillTag>
                  {t.visits === 10 && <div style={{ fontSize: 8, color: "#059669", fontWeight: 700, marginTop: 3, fontFamily: F.body }}>FREE CLASS!</div>}
                </div>
              </GlassCard>
            );
          })}
        </div>
      )}

      {/* Quick Insights */}
      <GlassCard style={{ padding: S.lg }}>
        <SectionLabel>Quick Insights</SectionLabel>
        <div style={{ display: "flex", flexDirection: "column", gap: S.md }}>
          {[
            { icon: "⚠️", text: "2 merge conflicts need your attention in Mindbody tab" },
            { icon: "⭐", text: "Anna B. just earned her free class — visit #10!" },
            { icon: "📱", text: "New phone-only tap-in at 08:45 — Barre Sculpt (USC)" },
            { icon: "🔗", text: "66% of TapIn members are linked to Mindbody" },
          ].map(function(ins, i) {
            return (
              <div key={i} style={{ display: "flex", gap: S.sm, alignItems: "flex-start" }}>
                <span style={{ fontSize: 14, flexShrink: 0 }}>{ins.icon}</span>
                <span style={{ fontSize: F.sm, color: C.text, fontFamily: F.body, lineHeight: 1.4 }}>{ins.text}</span>
              </div>
            );
          })}
        </div>
      </GlassCard>

      <div style={{ height: 80 }} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// CONFLICT RESOLUTION CARD (used in Mindbody tab)
// ═══════════════════════════════════════════════════════════

function ConflictCard(props) {
  var c = props.conflict;
  var onResolve = props.onResolve;

  // State: "review" → "confirm" → "resolved"
  var _phase = useState("review");
  var phase = _phase[0]; var setPhase = _phase[1];
  var _action = useState(null); // "link" | "merge" | "create" | "skip"
  var action = _action[0]; var setAction = _action[1];
  var _selectedIdx = useState(null);
  var selectedIdx = _selectedIdx[0]; var setSelectedIdx = _selectedIdx[1];
  var _mergeSelection = useState([]); // indices of candidates to merge
  var mergeSelection = _mergeSelection[0]; var setMergeSelection = _mergeSelection[1];

  function toggleMerge(idx) {
    var next = mergeSelection.indexOf(idx) >= 0
      ? mergeSelection.filter(function(i) { return i !== idx; })
      : mergeSelection.concat([idx]);
    setMergeSelection(next);
  }

  function handleConfirm() {
    setPhase("resolved");
    if (onResolve) onResolve();
  }

  // ─── Resolved state ───
  if (phase === "resolved") {
    var resolveLabel = action === "link" ? "Linked to " + c.candidates[selectedIdx].mbName
      : action === "merge" ? "Merged " + mergeSelection.length + " MB profiles & linked"
      : action === "create" ? "New Mindbody client created"
      : "Skipped — will revisit later";
    return (
      <GlassCard style={{ padding: S.lg, marginBottom: S.md, borderLeft: "3px solid #059669", opacity: 0.75 }}>
        <div style={{ display: "flex", alignItems: "center", gap: S.sm }}>
          <span style={{ fontSize: 18 }}>✅</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: F.sm, fontWeight: 700, color: C.text, fontFamily: F.body }}>{c.tapinName}</div>
            <div style={{ fontSize: F.xs, color: "#059669", fontFamily: F.body, fontWeight: 600 }}>{resolveLabel}</div>
          </div>
          <div onClick={function() { setPhase("review"); setAction(null); setSelectedIdx(null); setMergeSelection([]); }} style={{
            fontSize: F.xs, color: C.textA(0.35), cursor: "pointer", fontFamily: F.body,
          }}>Undo</div>
        </div>
      </GlassCard>
    );
  }

  // ─── Confirm state ───
  if (phase === "confirm") {
    var confirmTitle = action === "link" ? "Link to " + c.candidates[selectedIdx].mbName + "?"
      : action === "merge" ? "Merge " + mergeSelection.length + " Mindbody profiles?"
      : action === "create" ? "Create new Mindbody client?"
      : "Skip this conflict?";
    var confirmDesc = action === "link" ? "This will connect " + c.tapinName + "'s TapIn visits to the selected Mindbody profile. Their visit history will sync."
      : action === "merge" ? "The selected Mindbody profiles will be merged into one, then linked to this TapIn member. Booking history from both profiles will be combined."
      : action === "create" ? "A new Mindbody client will be created using " + c.tapinName + "'s TapIn data (phone: " + c.tapinPhone + "). None of the existing profiles will be linked."
      : "This conflict will stay in the queue. You can resolve it later.";
    return (
      <GlassCard heavy style={{ padding: S.lg, marginBottom: S.md, borderLeft: "3px solid " + C.blue }}>
        <div style={{ textAlign: "center", marginBottom: S.md }}>
          <div style={{ fontSize: 28, marginBottom: S.xs }}>{action === "link" ? "🔗" : action === "merge" ? "🔀" : action === "create" ? "➕" : "⏭️"}</div>
          <div style={{ fontSize: F.md, fontWeight: 700, color: C.text, fontFamily: F.display }}>{confirmTitle}</div>
          <div style={{ fontSize: F.xs, color: C.textA(0.5), fontFamily: F.body, marginTop: S.xs, lineHeight: 1.5 }}>{confirmDesc}</div>
        </div>
        <div style={{ display: "flex", gap: S.sm }}>
          <div onClick={function() { setPhase("review"); setAction(null); }} style={{
            flex: 1, textAlign: "center", padding: "10px 0", borderRadius: R.lg,
            border: "1.5px solid " + C.textA(0.1), fontSize: F.sm, fontWeight: 600,
            color: C.textA(0.5), fontFamily: F.body, cursor: "pointer",
          }}>Back</div>
          <div onClick={handleConfirm} style={{
            flex: 1, textAlign: "center", padding: "10px 0", borderRadius: R.lg,
            background: C.blueGrad, fontSize: F.sm, fontWeight: 700,
            color: C.white, fontFamily: F.body, cursor: "pointer",
            boxShadow: C.shadowSm,
          }}>Confirm</div>
        </div>
      </GlassCard>
    );
  }

  // ─── Review state (default) ───
  return (
    <GlassCard heavy style={{ padding: S.lg, marginBottom: S.md, borderLeft: "3px solid #DC2626" }}>
      {/* TapIn member header */}
      <div style={{ display: "flex", alignItems: "center", gap: S.sm, marginBottom: S.md }}>
        <span style={{ fontSize: 18 }}>⚠️</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: F.sm, fontWeight: 700, color: C.text, fontFamily: F.body }}>{c.tapinName}</div>
          <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>{c.tapinPhone} · {c.visits} visits · via {c.source}</div>
        </div>
        <span style={{ fontSize: 8, padding: "2px 8px", borderRadius: R.pill, background: "#FEE2E2", color: "#DC2626", fontWeight: 700, fontFamily: F.body }}>Conflict</span>
      </div>

      <div style={{ fontSize: F.xs, color: C.textA(0.5), fontFamily: F.body, fontWeight: 600, marginBottom: S.sm }}>
        {c.candidates.length} possible Mindbody matches found:
      </div>

      {/* Candidate cards — selectable */}
      {c.candidates.map(function(cand, ki) {
        var isSelected = selectedIdx === ki;
        var isMergeSelected = mergeSelection.indexOf(ki) >= 0;
        return (
          <div key={ki} style={{
            padding: "10px 12px", marginBottom: S.xs,
            borderRadius: R.lg,
            border: "1.5px solid " + (isSelected ? C.blueA(0.3) : isMergeSelected ? "#7C3AED33" : C.textA(0.08)),
            background: isSelected ? C.blueA(0.04) : isMergeSelected ? "rgba(124,58,237,0.03)" : C.whiteA(0.6),
            cursor: "pointer", transition: transition,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: S.sm }}>
              <div style={{ width: 28, height: 28, borderRadius: R.full, background: C.beigeGrad, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>👤</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: F.sm, fontWeight: 700, color: C.text, fontFamily: F.body }}>{cand.mbName}</div>
                <div style={{ fontSize: F.xs, color: C.textA(0.4), fontFamily: F.body }}>{cand.mbEmail}</div>
                <div style={{ fontSize: F.xs, color: C.textA(0.35), fontFamily: F.body }}>Last class: {cand.lastClass} · Booked via {cand.bookedVia}</div>
              </div>
            </div>
            {/* Action buttons per candidate */}
            <div style={{ display: "flex", gap: S.xs, marginTop: S.sm, marginLeft: 36 }}>
              <div onClick={function() { setSelectedIdx(ki); setAction("link"); setPhase("confirm"); }} style={{
                padding: "4px 10px", borderRadius: R.pill,
                background: C.blueA(0.08), color: C.blue,
                fontSize: 10, fontWeight: 700, fontFamily: F.body,
                border: "1px solid " + C.blueA(0.12), cursor: "pointer",
              }}>🔗 Link this one</div>
              <div onClick={function() { toggleMerge(ki); }} style={{
                padding: "4px 10px", borderRadius: R.pill,
                background: isMergeSelected ? "rgba(124,58,237,0.1)" : C.textA(0.03),
                color: isMergeSelected ? "#7C3AED" : C.textA(0.4),
                fontSize: 10, fontWeight: isMergeSelected ? 700 : 500, fontFamily: F.body,
                border: "1px solid " + (isMergeSelected ? "rgba(124,58,237,0.2)" : C.textA(0.08)),
                cursor: "pointer",
              }}>{isMergeSelected ? "✓ Selected" : "Select to merge"}</div>
            </div>
          </div>
        );
      })}

      {/* Merge button — shown when 2+ candidates selected */}
      {mergeSelection.length >= 2 && (
        <div onClick={function() { setAction("merge"); setPhase("confirm"); }} style={{
          textAlign: "center", padding: "10px 0", borderRadius: R.lg, marginTop: S.sm,
          background: "linear-gradient(135deg, #7C3AED, #6D28D9)", color: C.white,
          fontSize: F.sm, fontWeight: 700, fontFamily: F.body, cursor: "pointer",
          boxShadow: C.shadowSm,
        }}>🔀 Merge {mergeSelection.length} profiles & link</div>
      )}

      {/* Bottom actions */}
      <div style={{ display: "flex", gap: S.sm, marginTop: S.md }}>
        <div onClick={function() { setAction("skip"); setPhase("confirm"); }} style={{
          flex: 1, textAlign: "center", padding: "8px 0",
          fontSize: F.xs, color: C.textA(0.4), fontFamily: F.body,
          cursor: "pointer", borderRadius: R.md,
          border: "1px dashed " + C.textA(0.1),
        }}>⏭️ Skip for now</div>
        <div onClick={function() { setAction("create"); setPhase("confirm"); }} style={{
          flex: 1, textAlign: "center", padding: "8px 0",
          fontSize: F.xs, color: "#059669", fontFamily: F.body,
          cursor: "pointer", borderRadius: R.md, fontWeight: 600,
          border: "1px dashed " + C.greenA(0.2),
          background: C.greenA(0.03),
        }}>➕ Create new MB client</div>
      </div>
    </GlassCard>
  );
}

function MindbodyTab() {
  var _step = useState("connected"); // "disconnected" | "connecting" | "connected"
  var step = _step[0]; var setStep = _step[1];
  var _apiKey = useState("");
  var apiKey = _apiKey[0]; var setApiKey = _apiKey[1];
  var _syncing = useState(false);
  var syncing = _syncing[0]; var setSyncing = _syncing[1];
  var _syncMembers = useState(true);
  var syncMembers = _syncMembers[0]; var setSyncMembers = _syncMembers[1];
  var _syncSchedule = useState(true);
  var syncSchedule = _syncSchedule[0]; var setSyncSchedule = _syncSchedule[1];
  var _syncBookings = useState(false);

      {/* Connection Status */}

        <div style={{ display: "flex", alignItems: "center", gap: S.md }}>
          <div style={{
            width: 48, height: 48, borderRadius: R.md,
            background: step === "connected" ? C.greenA(0.08) : C.textA(0.04),
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24,

            {step === "connected" ? "✅" : "🔗"}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: F.md, fontWeight: 700, color: C.text, fontFamily: F.body }}>
              {step === "connected" ? "Connected" : "Not Connected"}
            </div>
            <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>

            {step === "connected" ? "Active" : "Offline"}

        </div>
      </GlassCard>

      {step === "disconnected" && (
        <Btn blue onClick={function() { setStep("connecting"); }} icon="🔗">
          Connect to Mindbody
        </Btn>
      )}

      {step === "connecting" && (
        <GlassCard heavy style={{ padding: S.xl }}>
          <div style={{ textAlign: "center", marginBottom: S.lg }}>
            <div style={{ fontSize: 28, marginBottom: S.sm }}>🔐</div>

            <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body, marginTop: S.xs }}>Find this in Mindbody → Settings → API</div>

            textAlign: "center", marginTop: S.md, fontSize: F.sm, color: C.textA(0.4),

        </GlassCard>

      {step === "connected" && (

              <div style={{ width: "66%", background: C.greenGrad, borderRadius: R.pill }} />
              <div style={{ width: "25.5%", background: C.blueGrad, marginLeft: 2 }} />
              <div style={{ width: "8.5%", background: "linear-gradient(135deg, #F59E0B, #D97706)", marginLeft: 2, borderRadius: "0 " + R.pill + "px " + R.pill + "px 0" }} />

      <div style={{ height: 80 }} />

}

                  <div>

              style={{

                border: "1.5px solid " + C.textA(0.08), background: C.whiteA(0.8),
                fontSize: F.sm, fontFamily: F.body, color: C.text,

            />

                  </div>

            </div>
          </GlassCard>

          {/* Reward Value */}
          {(rewardType === "discount" || rewardType === "custom") && (
            <GlassCard heavy style={{ padding: S.lg }}>

          </GlassCard>

          <Btn blue onClick={handleSave} icon="✓">

          </Btn>
        </React.Fragment>
      )}

      <div style={{ height: 80 }} />
    </div>
  );
}

          {[
            { label: "Visits", value: String(m.visits), emoji: "📱" },
            { label: "Source", value: m.source, emoji: m.source === "Direct" ? "🏠" : m.source === "USC" ? "🏃" : "🎟️" },
            { label: "Progress", value: m.visits + "/10", emoji: m.visits >= 10 ? "🎉" : "🎯" },
          ].map(function(s) {
            return (
              <GlassCard key={s.label} style={{ padding: S.md, textAlign: "center" }}>
                <div style={{ fontSize: 16, marginBottom: 2 }}>{s.emoji}</div>
                <div style={{ fontSize: F.md, fontWeight: 800, color: C.text, fontFamily: F.display }}>{s.value}</div>
                <div style={{ fontSize: 9, color: C.textA(0.4), fontFamily: F.body }}>{s.label}</div>
              </GlassCard>
            );
          })}
        </div>

        {/* Member info fields */}
        <GlassCard style={{ padding: S.lg }}>
          <SectionLabel>Details</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: S.md }}>
            {[
              { label: "Phone", value: m.phone },
              { label: "Last visit", value: m.lastVisit },
              { label: "Last class", value: m.class },
              { label: "Name", value: m.name || "—" },
              { label: "Email", value: m.name ? (m.name.split(" ")[0].toLowerCase() + "@email.de") : "—" },
            ].map(function(f) {
              return (
                <div key={f.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>{f.label}</span>
                  <span style={{ fontSize: F.sm, fontWeight: 600, color: f.value === "—" ? C.textA(0.25) : C.text, fontFamily: f.label === "Phone" ? "monospace" : F.body }}>{f.value}</span>
                </div>
              );
            })}
          </div>
        </GlassCard>

        {/* Actions */}
        <GlassCard style={{ padding: S.lg }}>
          <SectionLabel>Actions</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: S.sm }}>
            {[
              { label: "Send message", icon: "💬", color: C.blue },
              { label: "Edit details", icon: "✏️", color: C.text },
              { label: "View in Mindbody", icon: "🔗", color: "#059669", disabled: m.matchStatus !== "linked" },
              { label: "Resolve merge conflict", icon: "⚠️", color: "#DC2626", disabled: m.matchStatus !== "conflict" },
            ].filter(function(a) { return !a.disabled; }).map(function(a) {
              return (
                <div key={a.label} onClick={function() { showToast(); }} style={{
                  display: "flex", alignItems: "center", gap: S.sm, padding: "10px 14px",
                  borderRadius: R.lg, border: "1px solid " + C.textA(0.06),
                  cursor: "pointer", transition: transition,
                }}>
                  <span style={{ fontSize: 14 }}>{a.icon}</span>
                  <span style={{ fontSize: F.sm, fontWeight: 600, color: a.color, fontFamily: F.body }}>{a.label}</span>
                </div>
              );
            })}
          </div>
        </GlassCard>

        {toast && (
          <div style={{
            position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)",
            background: C.blueGrad, color: C.white, padding: "10px 24px",
            borderRadius: R.pill, fontSize: F.sm, fontWeight: 700, fontFamily: F.body,
            boxShadow: C.shadowLg, zIndex: 100,
          }}>Action triggered</div>
        )}

        <div style={{ height: 80 }} />
      </div>
    );
  }

  // ─── Member List View (default) ───
  return (
    <div style={{ padding: S.lg, display: "flex", flexDirection: "column", gap: S.md, position: "relative", overflow: "hidden" }}>
      <BlobBg2 color={C.beige} opacity={0.25} position="top-right" scale={1} />

      <div style={{ position: "relative", zIndex: 1, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div>
          <div style={{ fontSize: F.xs, color: C.textA(0.4), fontFamily: F.body }}>Members</div>
          <div style={{ fontSize: F.xxl, fontWeight: 800, color: C.text, fontFamily: F.display }}>{mockMembers.length} total</div>
        </div>
        <div onClick={function() { setView("add"); }} style={{
          padding: "8px 16px", borderRadius: R.pill, background: C.blueGrad,
          color: C.white, fontSize: F.xs, fontWeight: 700, cursor: "pointer",
          fontFamily: F.body, boxShadow: C.shadowSm,
        }}>+ Add</div>
      </div>

      {/* Filter chips */}
      <div style={{ display: "flex", gap: S.xs, flexWrap: "wrap", position: "relative", zIndex: 1 }}>
        {[
          { label: "All", count: mockMembers.length },
          { label: "🔗 Linked", count: mockMembers.filter(function(m) { return m.matchStatus === "linked"; }).length },
          { label: "📱 TapIn-only", count: mockMembers.filter(function(m) { return m.matchStatus === "standalone"; }).length },
          { label: "⚠️ Conflicts", count: mockMembers.filter(function(m) { return m.matchStatus === "conflict"; }).length },
        ].map(function(f) {
          return (
            <div key={f.label} onClick={function() { setSearch(f.label === "All" ? "" : f.label.slice(2).trim()); }} style={{
              padding: "5px 10px", borderRadius: R.pill,
              background: C.whiteA(0.7), border: "1px solid " + C.textA(0.08),
              fontSize: 9, fontWeight: 600, color: C.textA(0.55), fontFamily: F.body,
              cursor: "pointer", transition: transition,
            }}>{f.label} ({f.count})</div>
          );
        })}
      </div>

      {/* Search */}
      <GlassCard heavy style={{ padding: "10px 14px", display: "flex", alignItems: "center", gap: S.sm }}>
        <span style={{ fontSize: 14, color: C.textA(0.35) }}>🔍</span>
        <input
          value={search}
          onChange={function(e) { setSearch(e.target.value); }}
          placeholder="Search by name, phone, or source..."
          style={{
            flex: 1, border: "none", background: "transparent",
            fontSize: F.sm, fontFamily: F.body, color: C.text,
          }}
        />
        {search && (
          <span onClick={function() { setSearch(""); }} style={{ fontSize: 12, color: C.textA(0.35), cursor: "pointer" }}>✕</span>
        )}
      </GlassCard>

      {/* Member list */}
      <div style={{ position: "relative", zIndex: 1 }}>
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: S.xxl, color: C.textA(0.4), fontSize: F.sm, fontFamily: F.body }}>No members found</div>
        )}
        {filtered.map(function(m, i) {
          var statusColor = m.matchStatus === "linked" ? "#059669" : m.matchStatus === "conflict" ? "#DC2626" : m.matchStatus === "pending" ? "#D97706" : C.blue;
          var statusIcon = m.matchStatus === "linked" ? "🔗" : m.matchStatus === "conflict" ? "⚠️" : m.matchStatus === "pending" ? "⏳" : "📱";
          var isPhoneOnly = !m.name;
          var displayName = m.name || m.phone;
          return (
            <GlassCard key={i} onClick={function() { openDetail(m); }} style={{ padding: "12px 14px", marginBottom: S.sm, display: "flex", alignItems: "center", gap: S.md, cursor: "pointer" }}>
              <div style={{
                width: 36, height: 36, borderRadius: R.full,
                background: isPhoneOnly ? C.textA(0.06) : C.beigeGrad,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: isPhoneOnly ? 16 : 18, flexShrink: 0,
              }}>{m.avatar}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: F.sm, fontWeight: 700, color: isPhoneOnly ? C.textA(0.55) : C.text, fontFamily: isPhoneOnly ? "monospace" : F.body }}>{displayName}</span>
                  {isPhoneOnly && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: R.pill, background: "#FEF3C7", color: "#92400E", fontWeight: 600, fontFamily: F.body }}>Phone only</span>}
                  {!isPhoneOnly && m.source !== "Direct" && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: R.pill, background: C.textA(0.06), color: C.textA(0.45), fontWeight: 600, fontFamily: F.body }}>{m.source}</span>}
                </div>
                <div style={{ fontSize: F.xs, color: C.textA(0.45), fontFamily: F.body }}>{m.visits} visits · {m.lastVisit}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 12 }}>{statusIcon}</span>
                <PillTag variant={m.matchStatus === "linked" ? "green" : m.matchStatus === "conflict" ? "red" : m.visits >= 5 ? "blue" : "warm"}>{m.visits}/10</PillTag>
              </div>
            </GlassCard>
          );
        })}
      </div>

      {toast && (
        <div style={{
          position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)",
          background: C.greenGrad, color: C.white, padding: "10px 24px",
          borderRadius: R.pill, fontSize: F.sm, fontWeight: 700, fontFamily: F.body,
          boxShadow: C.shadowLg, zIndex: 100,
        }}>Member added</div>
      )}

      <div style={{ height: 80 }} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ADMIN APP (Root + Bottom Nav)
// ═══════════════════════════════════════════════════════════

function AdminApp() {
  var _tab = useState("dashboard");
  var tab = _tab[0]; var setTab = _tab[1];

  var tabs = [
    { id: "dashboard", label: "Home", icon: "📊" },
    { id: "members", label: "Members", icon: "👥" },
    { id: "mindbody", label: "Mindbody", icon: "🔗" },
    { id: "messaging", label: "Messages", icon: "💬" },
    { id: "loyalty", label: "Loyalty", icon: "🎁" },
  ];

  function renderTab() {
    switch (tab) {
      case "dashboard": return React.createElement(DashboardTab);
      case "members": return React.createElement(MembersTab);
      case "mindbody": return React.createElement(MindbodyTab);
      case "messaging": return React.createElement(MessagingTab);
      case "loyalty": return React.createElement(LoyaltyTab);
      default: return React.createElement(DashboardTab);
    }
  }

  return (
    <div style={{
      width: 375, height: 812, borderRadius: 50, overflow: "hidden",
      background: C.beigeGrad, position: "relative",
      boxShadow: "0 25px 60px rgba(0,0,68,0.2), 0 0 0 1px rgba(0,0,68,0.05)",
    }}>
      {/* Dynamic Island */}
      <div style={{
        height: 54, display: "flex", alignItems: "flex-start", justifyContent: "center",
        paddingTop: 12, position: "relative", zIndex: 10,
        background: C.whiteA(0.5),
      }}>
        <div style={{
          width: 120, height: 34, borderRadius: 20,
          background: "#1a1a1a", position: "relative",
        }} />
      </div>

      {/* Scrollable Content */}
      <div style={{
        height: 812 - 54 - 70, overflowY: "auto", overflowX: "hidden",
        WebkitOverflowScrolling: "touch",
      }}>
        {renderTab()}
      </div>

      {/* Bottom Nav */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0, height: 70,
        background: C.glassHeavy, backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
        borderTop: "1px solid " + C.glassBorder,
        display: "flex", alignItems: "flex-start", justifyContent: "space-around",
        paddingTop: 8, zIndex: 10,
      }}>
        {tabs.map(function(t) {
          var active = tab === t.id;
          return (
            <div key={t.id} onClick={function() { setTab(t.id); }} style={{
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
              cursor: "pointer", padding: "4px 12px", transition: transition,
            }}>
              <span style={{ fontSize: 20, opacity: active ? 1 : 0.45, transition: transition }}>{t.icon}</span>
              <span style={{
                fontSize: 9, fontWeight: active ? 800 : 500,
                color: active ? C.blue : C.textA(0.4),
                fontFamily: F.body, transition: transition,
              }}>{t.label}</span>
              {active && (
                <div style={{
                  width: 4, height: 4, borderRadius: R.full,
                  background: C.blueGrad, marginTop: 1,
                }} />
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Mount ───
var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AdminApp));
</script>
</body>
</html>
