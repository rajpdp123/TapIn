<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <clipPath id="phone"><rect width="375" height="812" rx="50" /></clipPath>
  </defs>
  <rect width="375" height="812" rx="50" fill="#B0482D" />
  <g clip-path="url(#phone)">
    <!-- Confetti particles -->
    <rect x="50" y="40" width="8" height="8" rx="2" fill="#EEDBC3" opacity="0.8" transform="rotate(30 54 44)" />
    <rect x="120" y="20" width="6" height="12" rx="2" fill="#001DA2" opacity="0.7" transform="rotate(-15 123 26)" />
    <rect x="200" y="50" width="10" height="6" rx="2" fill="#FFD700" opacity="0.8" transform="rotate(45 205 53)" />
    <rect x="280" y="30" width="8" height="8" rx="2" fill="#FBF6F1" opacity="0.7" transform="rotate(60 284 34)" />
    <rect x="320" y="60" width="6" height="10" rx="2" fill="#EEDBC3" opacity="0.6" transform="rotate(-30 323 65)" />
    <rect x="80" y="70" width="10" height="6" rx="2" fill="#FFD700" opacity="0.7" transform="rotate(15 85 73)" />
    <rect x="160" y="10" width="8" height="8" rx="2" fill="#FBF6F1" opacity="0.8" transform="rotate(-45 164 14)" />
    <rect x="240" y="80" width="6" height="12" rx="2" fill="#001DA2" opacity="0.6" transform="rotate(30 243 86)" />
    <circle cx="340" cy="90" r="4" fill="#FFD700" opacity="0.7" />
    <circle cx="30" cy="100" r="3" fill="#FBF6F1" opacity="0.6" />
    <circle cx="180" cy="95" r="5" fill="#EEDBC3" opacity="0.7" />
    <!-- Celebration icon -->
    <circle cx="187" cy="150" r="44" fill="rgba(238,219,195,0.2)" />
    <text x="187" y="166" text-anchor="middle" font-size="44">🎉</text>
    <!-- Headline -->
    <text x="187" y="224" text-anchor="middle" font-size="24" fill="#EEDBC3" font-weight="700" font-family="Quicksand, system-ui, sans-serif">You earned a free class!</text>
    <text x="187" y="248" text-anchor="middle" font-size="13" fill="rgba(238,219,195,0.8)" font-family="system-ui, sans-serif">10 visits completed — you're amazing!</text>
    <!-- All stamps filled (inverse beige on terracotta) -->
    <rect x="40" y="268" width="295" height="100" rx="16" fill="rgba(238,219,195,0.12)" />
    <g transform="translate(58,280)">
      <rect x="0" y="0" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="20" y="23" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="48" y="0" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="68" y="23" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="96" y="0" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="116" y="23" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="144" y="0" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="164" y="23" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="192" y="0" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="212" y="23" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="0" y="40" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="20" y="63" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="48" y="40" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="68" y="63" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="96" y="40" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="116" y="63" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="144" y="40" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="164" y="63" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
      <rect x="192" y="40" width="40" height="34" rx="7" fill="#EEDBC3" /><text x="212" y="63" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="700">✓</text>
    </g>
    <!-- Divider -->
    <line x1="60" y1="386" x2="315" y2="386" stroke="rgba(238,219,195,0.2)" stroke-width="1" />
    <!-- Form section -->
    <text x="187" y="416" text-anchor="middle" font-size="14" fill="#EEDBC3" font-weight="600" font-family="Quicksand, system-ui, sans-serif">Almost there — tell us your name</text>
    <text x="187" y="436" text-anchor="middle" font-size="11" fill="rgba(238,219,195,0.6)" font-family="system-ui, sans-serif">So we can book your free class</text>
    <!-- Name input -->
    <rect x="40" y="454" width="295" height="44" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(238,219,195,0.3)" stroke-width="1.5" />
    <text x="56" y="481" font-size="13" fill="rgba(238,219,195,0.5)" font-family="system-ui, sans-serif">Your name</text>
    <!-- Email input -->
    <rect x="40" y="508" width="295" height="44" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(238,219,195,0.3)" stroke-width="1.5" />
    <text x="56" y="535" font-size="13" fill="rgba(238,219,195,0.5)" font-family="system-ui, sans-serif">Your email</text>
    <!-- CTA -->
    <rect x="40" y="572" width="295" height="48" rx="12" fill="#EEDBC3" />
    <text x="187" y="600" text-anchor="middle" font-size="14" fill="#B0482D" font-weight="700" font-family="Quicksand, system-ui, sans-serif">Claim My Reward →</text>
  </g>
