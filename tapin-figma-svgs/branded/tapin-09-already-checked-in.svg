    <rect x="90" y="366" width="48" height="48" rx="10" fill="#B0482D" /><text x="114" y="394" text-anchor="middle" font-size="11" fill="#FFF" font-weight="600">✓</text>
    <rect x="146" y="366" width="48" height="48" rx="10" fill="#B0482D" /><text x="170" y="394" text-anchor="middle" font-size="11" fill="#FFF" font-weight="600">✓</text>
    <rect x="202" y="366" width="48" height="48" rx="10" fill="#B0482D" /><text x="226" y="394" text-anchor="middle" font-size="11" fill="#FFF" font-weight="600">✓</text>
    <rect x="258" y="366" width="48" height="48" rx="10" fill="#B0482D" /><text x="282" y="394" text-anchor="middle" font-size="11" fill="#FFF" font-weight="600">✓</text>
    <!-- Row 2: stamps 6-10, 6-7 filled -->
    <rect x="34" y="422" width="48" height="48" rx="10" fill="#B0482D" /><text x="58" y="450" text-anchor="middle" font-size="11" fill="#FFF" font-weight="600">✓</text>
    <rect x="90" y="422" width="48" height="48" rx="10" fill="#B0482D" /><text x="114" y="450" text-anchor="middle" font-size="11" fill="#FFF" font-weight="600">✓</text>
    <rect x="146" y="422" width="48" height="48" rx="10" fill="#EEDBC3" stroke="rgba(0,0,68,0.1)" stroke-width="2" /><text x="170" y="450" text-anchor="middle" font-size="11" fill="rgba(0,0,68,0.45)" font-weight="600">8</text>
    <rect x="202" y="422" width="48" height="48" rx="10" fill="#EEDBC3" stroke="rgba(0,0,68,0.1)" stroke-width="2" /><text x="226" y="450" text-anchor="middle" font-size="11" fill="rgba(0,0,68,0.45)" font-weight="600">9</text>
    <rect x="258" y="422" width="48" height="48" rx="10" fill="#EEDBC3" stroke="rgba(0,0,68,0.1)" stroke-width="2" /><text x="282" y="450" text-anchor="middle" font-size="11" fill="rgba(0,0,68,0.45)" font-weight="600">10</text>
