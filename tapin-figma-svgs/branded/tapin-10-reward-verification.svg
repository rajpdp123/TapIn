<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <clipPath id="phone"><rect width="375" height="812" rx="50" /></clipPath>
  </defs>
  <rect width="375" height="812" rx="50" fill="#FBF6F1" />
  <g clip-path="url(#phone)">
    <!-- Dynamic Island -->
    <rect x="0" y="0" width="375" height="54" fill="#FFFFFF" />
    <rect x="127" y="10" width="120" height="34" rx="17" fill="#1a1a1a" />
    <line x1="0" y1="54" x2="375" y2="54" stroke="rgba(0,0,68,0.1)" stroke-width="1" />
    <!-- Blob -->
    <g transform="translate(240,600) scale(0.8)" opacity="0.25">
      <circle cx="80" cy="80" r="100" fill="#EEDBC3" />
    </g>
    <!-- Studio pill -->
    <rect x="117" y="80" width="140" height="24" rx="12" fill="rgba(176,72,45,0.08)" />
    <text x="187" y="96" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="600" font-family="Quicksand, system-ui, sans-serif">Good Moves Studio</text>
    <!-- Gift icon -->
    <circle cx="187" cy="170" r="40" fill="rgba(176,72,45,0.1)" />
    <text x="187" y="184" text-anchor="middle" font-size="36">🎁</text>
    <!-- Headline -->
    <text x="187" y="240" text-anchor="middle" font-size="22" fill="#000044" font-weight="700" font-family="Quicksand, system-ui, sans-serif">Your free class is ready!</text>
    <text x="187" y="264" text-anchor="middle" font-size="13" fill="rgba(0,0,68,0.6)" font-family="system-ui, sans-serif">Show this code to reception to book</text>
    <!-- Verification code card -->
    <rect x="40" y="290" width="295" height="120" rx="20" fill="rgba(255,255,255,0.85)" stroke="rgba(176,72,45,0.2)" stroke-width="2" />
    <text x="187" y="320" text-anchor="middle" font-size="10" fill="rgba(0,0,68,0.45)" font-weight="700" font-family="system-ui, sans-serif" letter-spacing="2">VERIFICATION CODE</text>
    <!-- Large code display -->
    <text x="187" y="372" text-anchor="middle" font-size="44" fill="#B0482D" font-weight="700" font-family="'SF Mono', 'Menlo', monospace" letter-spacing="6">482 901</text>
    <text x="187" y="400" text-anchor="middle" font-size="10" fill="rgba(0,0,68,0.45)" font-family="system-ui, sans-serif">Valid until claimed</text>
    <!-- Instructions -->
    <rect x="20" y="434" width="335" height="80" rx="16" fill="rgba(255,255,255,0.72)" stroke="rgba(0,0,68,0.08)" stroke-width="1.5" />
    <text x="40" y="460" font-size="12" fill="#000044" font-weight="600" font-family="system-ui, sans-serif">How to redeem:</text>
    <text x="40" y="480" font-size="11" fill="rgba(0,0,68,0.6)" font-family="system-ui, sans-serif">1. Show this screen to the receptionist</text>
    <text x="40" y="498" font-size="11" fill="rgba(0,0,68,0.6)" font-family="system-ui, sans-serif">2. They'll book your free class in Mindbody</text>
    <!-- Stamp reset note -->
    <rect x="20" y="534" width="335" height="50" rx="16" fill="rgba(0,29,162,0.05)" />
    <text x="187" y="556" text-anchor="middle" font-size="11" fill="#001DA2" font-family="system-ui, sans-serif">Your stamp card has been reset — start collecting</text>
    <text x="187" y="572" text-anchor="middle" font-size="11" fill="#001DA2" font-family="system-ui, sans-serif">again for your next free class! 🎉</text>
    <!-- Saved note -->
    <text x="187" y="614" text-anchor="middle" font-size="11" fill="rgba(0,0,68,0.45)" font-family="system-ui, sans-serif">Your code is saved — find it anytime in My Card</text>
    <!-- Done button -->
    <rect x="20" y="732" width="335" height="48" rx="12" fill="#B0482D" />
    <text x="187" y="760" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700" font-family="Quicksand, system-ui, sans-serif">Done</text>
  </g>
</svg>