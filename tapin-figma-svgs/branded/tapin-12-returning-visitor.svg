<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <clipPath id="phone"><rect width="375" height="812" rx="50" /></clipPath>
  </defs>
  <rect width="375" height="812" rx="50" fill="#FBF6F1" />
