    <g transform="translate(80,274)">
      <rect x="0" y="0" width="22" height="22" rx="5" fill="#B0482D" /><text x="11" y="15" text-anchor="middle" font-size="8" fill="#FFF">✓</text>
      <rect x="26" y="0" width="22" height="22" rx="5" fill="#B0482D" /><text x="37" y="15" text-anchor="middle" font-size="8" fill="#FFF">✓</text>
      <rect x="52" y="0" width="22" height="22" rx="5" fill="#B0482D" /><text x="63" y="15" text-anchor="middle" font-size="8" fill="#FFF">✓</text>
      <rect x="78" y="0" width="22" height="22" rx="5" fill="#B0482D" /><text x="89" y="15" text-anchor="middle" font-size="8" fill="#FFF">✓</text>
      <rect x="104" y="0" width="22" height="22" rx="5" fill="#B0482D" /><text x="115" y="15" text-anchor="middle" font-size="8" fill="#FFF">✓</text>
      <rect x="130" y="0" width="22" height="22" rx="5" fill="#B0482D" /><text x="141" y="15" text-anchor="middle" font-size="8" fill="#FFF">✓</text>
      <rect x="156" y="0" width="22" height="22" rx="5" fill="#EEDBC3" stroke="rgba(0,0,68,0.1)" stroke-width="1" /><text x="167" y="15" text-anchor="middle" font-size="8" fill="rgba(0,0,68,0.3)">7</text>
      <rect x="182" y="0" width="22" height="22" rx="5" fill="#EEDBC3" stroke="rgba(0,0,68,0.1)" stroke-width="1" /><text x="193" y="15" text-anchor="middle" font-size="8" fill="rgba(0,0,68,0.3)">8</text>
    </g>
    <!-- Big Check In button -->
    <rect x="40" y="380" width="295" height="64" rx="20" fill="#B0482D" />
    <text x="187" y="418" text-anchor="middle" font-size="20" fill="#FFFFFF" font-weight="700" font-family="Quicksand, system-ui, sans-serif">Check In</text>
    <!-- Not you link -->
    <text x="187" y="470" text-anchor="middle" font-size="12" fill="rgba(0,0,68,0.4)" font-family="system-ui, sans-serif">Not Sarah? <tspan fill="#B0482D" font-weight="600">Switch account</tspan></text>
    <!-- My Card link -->
