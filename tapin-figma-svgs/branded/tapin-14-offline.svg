<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <clipPath id="phone"><rect width="375" height="812" rx="50" /></clipPath>
  </defs>
  <rect width="375" height="812" rx="50" fill="#FBF6F1" />
  <g clip-path="url(#phone)">
    <!-- Dynamic Island -->
    <rect x="0" y="0" width="375" height="54" fill="#FFFFFF" />
    <rect x="127" y="10" width="120" height="34" rx="17" fill="#1a1a1a" />
    <line x1="0" y1="54" x2="375" y2="54" stroke="rgba(0,0,68,0.1)" stroke-width="1" />
    <!-- Blobs faded -->
    <g transform="translate(-40,400) scale(1)" opacity="0.15">
      <circle cx="80" cy="80" r="120" fill="#EEDBC3" />
    </g>
    <!-- Studio pill -->
    <rect x="117" y="90" width="140" height="24" rx="12" fill="rgba(176,72,45,0.08)" />
    <text x="187" y="106" text-anchor="middle" font-size="10" fill="#B0482D" font-weight="600" font-family="Quicksand, system-ui, sans-serif">Good Moves Studio</text>
    <!-- Offline cloud icon -->
    <circle cx="187" cy="220" r="50" fill="rgba(0,0,68,0.04)" />
    <!-- Cloud shape -->
    <g transform="translate(152,190)">
      <circle cx="35" cy="30" r="20" fill="rgba(0,0,68,0.15)" />
      <circle cx="22" cy="38" r="14" fill="rgba(0,0,68,0.15)" />
      <circle cx="48" cy="38" r="14" fill="rgba(0,0,68,0.15)" />
      <rect x="10" y="38" width="50" height="14" rx="2" fill="rgba(0,0,68,0.15)" />
      <!-- Slash -->
      <line x1="15" y1="55" x2="55" y2="15" stroke="#B0482D" stroke-width="3" stroke-linecap="round" />
    </g>
    <!-- Headline -->
    <text x="187" y="310" text-anchor="middle" font-size="22" fill="#000044" font-weight="700" font-family="Quicksand, system-ui, sans-serif">You're offline</text>
    <text x="187" y="336" text-anchor="middle" font-size="13" fill="rgba(0,0,68,0.55)" font-family="system-ui, sans-serif">Please check your connection to check in.</text>
    <text x="187" y="356" text-anchor="middle" font-size="13" fill="rgba(0,0,68,0.55)" font-family="system-ui, sans-serif">Check-ins need an internet connection.</text>
    <!-- Retry button -->
    <rect x="100" y="390" width="175" height="48" rx="12" fill="#B0482D" />
    <text x="187" y="418" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700" font-family="Quicksand, system-ui, sans-serif">Try Again</text>
    <!-- Cached card (greyed) -->
    <text x="187" y="480" text-anchor="middle" font-size="10" fill="rgba(0,0,68,0.35)" font-weight="600" font-family="system-ui, sans-serif">YOUR LAST KNOWN PROGRESS</text>
    <rect x="40" y="494" width="295" height="100" rx="16" fill="rgba(255,255,255,0.5)" stroke="rgba(0,0,68,0.06)" stroke-width="1" />
    <!-- Mini stamps greyed -->
    <g transform="translate(60,510)" opacity="0.5">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#B0482D" /><text x="15" y="20" text-anchor="middle" font-size="9" fill="#FFF" font-weight="600">✓</text>
      <rect x="36" y="0" width="30" height="30" rx="6" fill="#B0482D" /><text x="51" y="20" text-anchor="middle" font-size="9" fill="#FFF" font-weight="600">✓</text>
      <rect x="72" y="0" width="30" height="30" rx="6" fill="#B0482D" /><text x="87" y="20" text-anchor="middle" font-size="9" fill="#FFF" font-weight="600">✓</text>
      <rect x="108" y="0" width="30" height="30" rx="6" fill="#B0482D" /><text x="123" y="20" text-anchor="middle" font-size="9" fill="#FFF" font-weight="600">✓</text>
      <rect x="144" y="0" width="30" height="30" rx="6" fill="#B0482D" /><text x="159" y="20" text-anchor="middle" font-size="9" fill="#FFF" font-weight="600">✓</text>
      <rect x="180" y="0" width="30" height="30" rx="6" fill="#B0482D" /><text x="195" y="20" text-anchor="middle" font-size="9" fill="#FFF" font-weight="600">✓</text>
      <rect x="0" y="36" width="30" height="30" rx="6" fill="#EEDBC3" /><text x="15" y="56" text-anchor="middle" font-size="9" fill="rgba(0,0,68,0.3)">7</text>
      <rect x="36" y="36" width="30" height="30" rx="6" fill="#EEDBC3" /><text x="51" y="56" text-anchor="middle" font-size="9" fill="rgba(0,0,68,0.3)">8</text>
      <rect x="72" y="36" width="30" height="30" rx="6" fill="#EEDBC3" /><text x="87" y="56" text-anchor="middle" font-size="9" fill="rgba(0,0,68,0.3)">9</text>
      <rect x="108" y="36" width="30" height="30" rx="6" fill="#EEDBC3" /><text x="123" y="56" text-anchor="middle" font-size="9" fill="rgba(0,0,68,0.3)">10</text>
    </g>
    <text x="187" y="610" text-anchor="middle" font-size="9" fill="rgba(0,0,68,0.3)" font-family="system-ui, sans-serif">Last updated: Today 09:30</text>
  </g>
